submit_mode: auto
dry_run: false
match_threshold: 70
auto_approve_on_score: true
skip_score_check: true
max_applies_per_run: 20
min_delay_ms: 1200
max_delay_ms: 4200
headless: false
login_mode: persistent
browser_profile_dir: browser_profile
llm_model: openai/gpt-4o-mini
llm_temperature: 0.4
enable_hiring_posts: true
resume_output_format: pdf
search:
  titles:
  - Senior Software Engineer
  - Staff Software Engineer
  keywords: ''
  locations:
  - United States
  - Seattle, Washington, United States
  remote: true
  on_site: false
  hybrid: true
  experience_levels:
  - mid-senior
  date_posted: past-week
  easy_apply_only: false
  max_jobs_per_search: 25
blacklist_companies: []
blacklist_title_keywords:
- Clearance
- Senior Director
schedule:
  enabled: false
  mode: interval
  interval_hours: 1
  time: 09:00
  days:
  - mon
  - tue
  - wed
  - thu
  - fri
  workflow: schedule-run
  only_approved: false
  skip_generate: true
db_path: data/state.db
sheet_path: data/jobs.xlsx
master_resume_path: profile/master_resume.pdf
intake_path: profile/intake.yaml
output_dir: output
