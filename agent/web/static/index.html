<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>linkedin-ai-apply</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="site-header" id="site-header">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <h1>linkedin&#8209;ai&#8209;apply</h1>
    </div>
    <div class="pipeline" role="group" aria-label="Pipeline actions">
      <button id="btn-intake" type="button" class="pipeline-step" aria-expanded="false">
        <span class="pipeline-num">1</span>
        Profile &amp; resume
      </button>
      <span class="pipeline-arrow" aria-hidden="true"></span>
      <button id="btn-find" type="button" class="pipeline-step">
        <span class="pipeline-num">2</span>
        Fetch jobs
      </button>
      <span class="pipeline-arrow" aria-hidden="true"></span>
      <button id="btn-generate" type="button" class="pipeline-step">
        <span class="pipeline-num">3</span>
        Generate drafts
        <span class="pipeline-optional">optional</span>
      </button>
      <span class="pipeline-arrow" aria-hidden="true"></span>
      <button id="btn-apply" type="button" class="pipeline-step pipeline-step-final">
        <span class="pipeline-num">4</span>
        Apply approved
      </button>
    </div>
    <div class="topbar-right">
      <div id="config-badges" class="config-badges" aria-label="Run settings"></div>
      <span id="schedule-chip" class="schedule-chip" hidden></span>
      <button id="btn-schedule" type="button" class="btn btn-sm btn-schedule">Schedule</button>
      <div class="stop-slot">
        <button id="btn-stop" class="btn btn-stop" type="button" hidden>Stop</button>
      </div>
      <div id="run-status" class="run-status idle">Ready</div>
    </div>
  </header>

  <section class="filters" aria-label="Job filters">
    <input id="f-search" type="search" placeholder="Search title or company&hellip;" />
    <select id="f-status">
      <option value="">All statuses</option>
      <option value="new">New</option>
      <option value="generated">Draft ready</option>
      <option value="applied">Applied</option>
      <option value="human_review">Needs review</option>
      <option value="skipped">Skipped</option>
      <option value="error">Error</option>
    </select>
    <label class="minscore" title="Display filter only; apply eligibility uses MATCH_THRESHOLD from config">
      Min score
      <input id="f-score" type="number" min="0" max="100" step="5" value="0" />
    </label>
    <label class="chk"><input id="f-approved" type="checkbox" /> Approved only</label>
    <label class="chk"><input id="f-hasresume" type="checkbox" /> Has resume</label>
  </section>
  </div>

  <div class="app-scroll">
  <section id="intake-panel" class="pipeline-panel" hidden>
    <p class="intake-panel-lead">Application profile (intake) — answers used on job application forms.</p>
    <section class="resume-bar" aria-label="Master resume">
      <span class="master-bar-label">Master resume</span>
      <span id="master-hint" class="master-hint"></span>
      <button id="btn-replace-master" class="btn btn-sm" type="button" title="Upload profile/master_resume and refresh intake.yaml">Replace master&hellip;</button>
    </section>
    <div id="intake-content" class="intake-content"></div>
  </section>

  <section class="subbar">
    <button id="btn-runs" class="linklike" type="button">Recent runs&hellip;</button>
  </section>

  <input id="upload-master" type="file" accept=".docx,.pdf,.txt" hidden />
  <input id="upload-job-resume" type="file" accept=".docx,.pdf" hidden />
  <input id="upload-job-cover" type="file" accept=".docx,.pdf,.txt" hidden />

  <div id="selection-bar" class="selection-bar" hidden>
    <span id="selcount" class="selcount">0 selected</span>
    <button id="btn-clear-sel" class="linklike" type="button">Clear selection</button>
    <span class="spacer"></span>
    <span class="bulk-label">Set resume for selected:</span>
    <button id="btn-resume-tailored" class="btn btn-sm" title="Use each job's tailored resume when applying">Tailored draft</button>
    <button id="btn-resume-mine" class="btn btn-sm" title="Use your master resume when applying">My master</button>
    <button id="btn-approve" class="btn btn-ok">Approve selected</button>
    <button id="btn-reject" class="btn btn-warn" title="Clears approval — does not skip or dismiss the job">Clear approval</button>
  </div>

  <section class="stats" id="stats" aria-label="Job statistics">
    <span class="pill dim">Loading stats&hellip;</span>
  </section>

  <main>
    <div class="table-wrap">
    <div id="grid-loading" class="grid-loading" hidden>
      <div class="spinner"></div>
      <span>Loading jobs&hellip;</span>
    </div>
    <table id="grid">
      <thead>
        <tr>
          <th class="c-check"><input id="check-all" type="checkbox" aria-label="Select all visible jobs" /></th>
          <th class="c-title sortable" data-sort="title" data-label="Title">Title</th>
          <th class="sortable" data-sort="company" data-label="Company">Company</th>
          <th>Location</th>
          <th class="sortable" data-sort="match_score" data-label="Score" title="Score colors: green ≥75, yellow ≥50, gray below">Score</th>
          <th class="sortable" data-sort="apply_type" data-label="Type">Type</th>
          <th class="sortable" data-sort="status" data-label="Status">Status</th>
          <th id="col-approved">Approved</th>
          <th title="Which resume file is uploaded when you apply to this job">Resume on apply</th>
          <th>Files</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    </div>
    <p id="empty" class="empty" hidden></p>
    <p id="empty-onboarding" class="empty onboarding" hidden></p>
  </main>

  <footer class="site-footer">
    <button id="btn-reset" class="btn btn-sm btn-danger" type="button" title="Delete all jobs and run history from the database">Reset all data&hellip;</button>
  </footer>
  </div>

  <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>

  <div id="schedule-modal" class="modal" hidden aria-hidden="true">
    <div class="modal-backdrop" id="schedule-modal-backdrop"></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="schedule-modal-title">
      <div class="modal-header">
        <h2 id="schedule-modal-title">Schedule</h2>
        <button id="btn-schedule-close" type="button" class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="schedule-panel" class="schedule-panel"></div>
    </div>
  </div>

  <div id="runs-modal" class="modal" hidden aria-hidden="true">
    <div class="modal-backdrop" id="runs-modal-backdrop"></div>
    <div class="modal-dialog modal-dialog-wide" role="dialog" aria-modal="true" aria-labelledby="runs-modal-title">
      <div class="modal-header">
        <h2 id="runs-modal-title">Recent runs</h2>
        <button id="btn-runs-close" type="button" class="modal-close" aria-label="Close">&times;</button>
      </div>
      <div id="runs-panel" class="runs-panel"></div>
    </div>
  </div>

  <script src="/static/app.js?v=7"></script>
</body>
</html>
